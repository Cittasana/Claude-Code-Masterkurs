name: Seed Production Content

# Re-trigger 2026-05-12: RAILWAY_DATABASE_URL secret switched from internal
# to DATABASE_PUBLIC_URL so the runner can reach Postgres from outside.

on:
  push:
    branches: [main]
    # M2: Only re-seed when content that prisma/seed.ts actually imports
    # has changed. Previously this triggered on any src/data/** edit, so
    # adjacent files (tools/**, patterns.ts, leaderboardSeed.ts) that
    # seed.ts does NOT read would still pay the cost of a full Railway
    # reseed. Keep this list in sync with the imports at the top of
    # claude-code-masterkurs/server/prisma/seed.ts.
    paths:
      - 'claude-code-masterkurs/src/data/lessons.ts'
      - 'claude-code-masterkurs/src/data/quizzes.ts'
      - 'claude-code-masterkurs/src/data/projects.ts'
      - 'claude-code-masterkurs/src/data/freelancerTrack.ts'
      - 'claude-code-masterkurs/src/data/capstoneProjects.ts'
      - 'claude-code-masterkurs/src/data/challenges.ts'
      - 'claude-code-masterkurs/src/data/liveCodingChallenges.ts'
      - 'claude-code-masterkurs/src/data/projectTemplates.ts'
      - 'claude-code-masterkurs/src/data/playgroundTasks.ts'
      - 'claude-code-masterkurs/src/data/features.ts'
      - 'claude-code-masterkurs/src/data/forumCategories.ts'
      - 'claude-code-masterkurs/src/data/officialDocs.ts'
      - 'claude-code-masterkurs/server/prisma/seed.ts'
      - 'claude-code-masterkurs/server/prisma/schema.prisma'
      - '.github/workflows/seed-content.yml'
  workflow_dispatch:

jobs:
  seed:
    name: Upsert lessons, quizzes, projects to Railway Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: claude-code-masterkurs/server/package-lock.json

      - name: Install server dependencies
        working-directory: claude-code-masterkurs/server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: claude-code-masterkurs/server
        run: npx prisma generate

      - name: Run seed against Railway Postgres
        working-directory: claude-code-masterkurs/server
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: npm run db:seed

      - name: Summary
        if: always()
        run: |
          echo "Seed run finished. Check claude-code-masterkurs.de/dashboard for the live lesson count." >> $GITHUB_STEP_SUMMARY
