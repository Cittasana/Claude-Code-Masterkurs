name: Weekly Freshness Pass

# Runs Sundays 03:00 UTC (= 04:00 / 05:00 Europe-Berlin depending on DST).
# Chains the three audit phases and opens a PR with the diff + audit report.
#
# Required secrets:
#   ANTHROPIC_API_KEY   — used by audit:freshness and audit:critic
#   RAILWAY_DATABASE_URL — used by audit:apply for the LessonConfig metadata sync
#   (workflow uses the default GITHUB_TOKEN to open the PR)

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/weekly-freshness-pass.yml'
      - 'claude-code-masterkurs/server/scripts/freshness-*.ts'

permissions:
  contents: write
  pull-requests: write

jobs:
  freshness:
    name: Audit → Critic → Apply → PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: claude-code-masterkurs/server/package-lock.json

      - name: Install server dependencies
        working-directory: claude-code-masterkurs/server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: claude-code-masterkurs/server
        run: npx prisma generate

      - name: Run freshness audit (executor)
        working-directory: claude-code-masterkurs/server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run audit:freshness

      - name: Run freshness critic (Opus 4.7)
        working-directory: claude-code-masterkurs/server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run audit:critic

      - name: Apply approved patches + sync metadata to DB
        working-directory: claude-code-masterkurs/server
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: npm run audit:apply

      # M1: Pre-merge structural check.
      # The applier writes raw model output into a TypeScript template literal
      # in lessons.ts. A bad escape (or any other patch defect) breaks parsing
      # and would cascade through into the prod seed on merge. Compile the
      # frontend before opening the PR so any TS error fails the workflow
      # instead of landing in a green-looking PR.
      - name: Install frontend deps
        working-directory: claude-code-masterkurs
        run: npm ci

      - name: Type-check frontend after patches
        working-directory: claude-code-masterkurs
        run: npx tsc -b

      - name: Configure git for PR
        run: |
          git config user.name "freshness-bot"
          git config user.email "freshness-bot@users.noreply.github.com"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --quiet --staged; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No content changes this week — only metadata sync to DB."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure auto-content label exists (idempotent)
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          gh label create auto-content \
            --color "F4845F" \
            --description "Automated content updates from the weekly freshness pass" \
            || echo "Label already exists, continuing."

      - name: Create branch + PR with audit results
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="freshness/$DATE"
          git checkout -b "$BRANCH"
          git add claude-code-masterkurs/src/data/lessons.ts \
                  masterkurs-agent/freshness-output/ \
                  masterkurs-agent/freshness-reports/
          git commit -m "chore(content): weekly freshness pass $DATE

          Generated by Weekly Freshness Pass workflow.
          See masterkurs-agent/freshness-reports/$DATE-applied.md for details."
          git push origin "$BRANCH"

          REPORT_FILE="masterkurs-agent/freshness-reports/$DATE-applied.md"

          # Body in a tmpfile keeps quoting sane and avoids heredoc-in-heredoc traps.
          BODY_FILE="$(mktemp)"
          {
            echo "## Weekly Freshness Pass — $DATE"
            echo ""
            echo "Auto-generated audit + critic-reviewed patches against the latest weekly research report."
            echo "Patches with verdict \`approve\` were applied to \`lessons.ts\` and \`LessonConfig\` metadata was synced to the Railway DB."
            echo "Patches marked \`needs-human\` were escalated as warnings and are visible in the LessonView freshness banner."
            echo ""
            echo "See full report in \`$REPORT_FILE\`."
            echo ""
            echo "---"
            echo ""
            cat "$REPORT_FILE"
          } > "$BODY_FILE"

          # gh pr create without --label first (label is best-effort, added after).
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(content): weekly freshness pass $DATE" \
            --body-file "$BODY_FILE")
          echo "Opened PR: $PR_URL"

          # Best-effort label add — don't fail the workflow if it errors.
          gh pr edit "$PR_URL" --add-label "auto-content" || echo "Could not add label, continuing."

      - name: Summary on idle weeks
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "Weekly freshness pass completed without content changes."  >> $GITHUB_STEP_SUMMARY
          echo "LessonConfig metadata (lastVerified / freshnessWarnings) was synced to the DB." >> $GITHUB_STEP_SUMMARY
