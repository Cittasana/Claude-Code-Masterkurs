# ─────────────────────────────────────────────────────────────
# CI Pipeline - Quality Gate
# Lint → TypeCheck → Build für Frontend & Backend
# Deployment erfolgt automatisch über Vercel (Frontend) & Railway (Backend)
# ─────────────────────────────────────────────────────────────

name: CI - Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Verhindert doppelte Runs bei Push + PR auf denselben Branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend (React/Vite) ────────────────────────────────────
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript Type-Check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build

      - name: Check Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Build-Verzeichnis 'dist' wurde nicht erstellt!"
            exit 1
          fi
          echo "✓ Build erfolgreich - dist/ Verzeichnis existiert"
          du -sh dist/
          echo "Dateien im Build:"
          find dist -type f | head -20

  # ── Backend (Express/Prisma) ─────────────────────────────────
  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: TypeScript Type-Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Build-Verzeichnis 'dist' wurde nicht erstellt!"
            exit 1
          fi
          echo "✓ Build erfolgreich - dist/ Verzeichnis existiert"
          du -sh dist/

  # ── Security Audit ───────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Audit Frontend Dependencies
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Audit Backend Dependencies
        run: npm audit --audit-level=high || true
        working-directory: server
        continue-on-error: true

  # ── Zusammenfassung ──────────────────────────────────────────
  ci-success:
    name: CI Erfolgreich
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()

    steps:
      - name: Prüfe Ergebnisse
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs.backend.result }}" != "success" ]; then
            echo "::error::CI fehlgeschlagen! Frontend: ${{ needs.frontend.result }}, Backend: ${{ needs.backend.result }}"
            exit 1
          fi
          echo "✓ Alle CI-Checks erfolgreich bestanden!"
          echo ""
          echo "Nächste Schritte nach Merge:"
          echo "  → Vercel deployt Frontend automatisch"
          echo "  → Railway deployt Backend automatisch"
