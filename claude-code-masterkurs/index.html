    <!-- Structured Data: FAQPage (häufige Fragen für Rich Snippets & GEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Was ist Claude Code?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Claude Code ist ein autonomer KI-gesteuerter Coding-Agent von Anthropic, der im Terminal läuft. Im Gegensatz zu Autocomplete-Tools wie GitHub Copilot arbeitet Claude Code proaktiv: Es versteht ganze Projekte, liest und schreibt Dateien, führt Shell-Befehle und Git-Operationen aus und kommuniziert über das Model Context Protocol (MCP) mit externen Services wie Datenbanken, APIs und Issue-Trackern."
          }
        },
        {
          "@type": "Question",
          "name": "Wie unterscheidet sich Claude Code von GitHub Copilot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Claude Code ist ein autonomer Agent, der ganze Aufgaben eigenständig erledigt – von der Dateianalyse über das Code-Schreiben bis zum Git-Commit. Copilot ist ein Autocomplete-Tool für Inline-Code-Vorschläge. Claude Code hat Zugriff auf das gesamte Projekt, kann Shell-Befehle ausführen, Tests starten und über MCP-Server mit externen Tools kommunizieren. Copilot arbeitet primär innerhalb des Editors."
          }
        },
        {
          "@type": "Question",
          "name": "Welche Abo-Modelle gibt es?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Der Claude Code Masterkurs bietet drei Abo-Modelle: Monatlich (24 EUR/Monat, flexibel kündbar), Jährlich (229 EUR/Jahr, spare 20%), und Lifetime (499 EUR einmalig, lebenslanger Zugriff). Alle Modelle beinhalten Zugang zu allen 27 Lektionen, Quizzes, dem Live-Playground und Community-Features."
          }
        },
        {
          "@type": "Question",
          "name": "Wie installiert man Claude Code?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Claude Code wird über npm installiert: 1) Node.js 18+ installieren, 2) 'npm install -g @anthropic-ai/claude-code' im Terminal ausführen, 3) 'claude' starten und den Anthropic API-Key eingeben oder OAuth-Authentifizierung nutzen. Es läuft auf macOS, Linux und Windows (WSL2 empfohlen)."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist das Model Context Protocol (MCP)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MCP (Model Context Protocol) ist ein offenes Protokoll von Anthropic, das Claude Code ermöglicht, mit externen Tools und Services zu kommunizieren. Über MCP Server kann Claude Code auf Datenbanken (PostgreSQL, SQLite), APIs (GitHub, Jira, Slack), Dateisysteme und weitere Services zugreifen. Es erweitert die Fähigkeiten von Claude Code über das lokale Dateisystem hinaus."
          }
        },
        {
          "@type": "Question",
          "name": "Was kostet Claude Code?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Claude Code erfordert einen Anthropic API-Key. Die Kosten richten sich nach dem Tokenverbrauch: Claude Sonnet 4 kostet ca. $3/$15 pro Million Input/Output Tokens, Claude Opus 4 ca. $15/$75. Ein typischer Entwicklungstag kostet je nach Nutzungsintensität $1–20. Alternativ gibt es den Max Plan mit monatlicher Pauschale."
          }
        },
        {
          "@type": "Question",
          "name": "Welche Programmiersprachen unterstützt Claude Code?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Claude Code ist sprachunabhängig und unterstützt alle gängigen Programmiersprachen: Python, JavaScript, TypeScript, Rust, Go, Java, C++, C#, Ruby, PHP, Swift, Kotlin und viele weitere. Da es im Terminal arbeitet, ist es nicht an eine bestimmte IDE oder Sprache gebunden."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist eine CLAUDE.md Datei?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Die CLAUDE.md ist eine Markdown-Datei im Projektstamm, die Claude Code Kontext über das Projekt gibt. Sie enthält Projektbeschreibung, Architektur, Coding-Konventionen, Tech Stack und spezielle Anweisungen. Claude Code liest diese Datei automatisch beim Start und nutzt den Inhalt, um kontextbezogener und projektspezifischer zu arbeiten."
          }
        }
      ]
    }
    </script>
