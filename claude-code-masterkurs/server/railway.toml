# ─────────────────────────────────────────────────────────────
# Railway Configuration - Backend Service
# https://docs.railway.app/reference/config-as-code
# ─────────────────────────────────────────────────────────────

[build]
# Use Dockerfile for build
dockerfilePath = "Dockerfile"

[deploy]
# Start command (handled by Dockerfile CMD, but can override here)
# startCommand = "npx prisma migrate deploy && node dist/index.js"

# Health check (extended timeout for initial db push)
healthcheckPath = "/health"
healthcheckTimeout = 60

# Number of replicas (1 for hobby plan)
numReplicas = 1

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
